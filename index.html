<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nice Home Care Services</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a3b5d;
            --secondary-color: #e67e22;
            --accent-bg: #f0f7fa;
            --text-main: #2c3e50;
            --text-light: #34495e;
            --white: #ffffff;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--accent-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: var(--white);
            border-radius: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-container i {
            font-size: 35px;
            color: var(--white);
        }

        .header-text h1 {
            font-size: 28px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-text h1 span {
            color: var(--secondary-color);
            font-weight: 300;
        }

        .content-section {
            border-left: 6px solid var(--secondary-color);
            padding: 15px 20px;
            background: #fefcf9;
            border-radius: 0 15px 15px 0;
            margin-bottom: 25px;
        }

        .subhead {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subhead small {
            display: block;
            font-size: 16px;
            font-weight: 400;
            color: var(--text-light);
            margin-top: 5px;
        }

        .schedule-box {
            background: #eaf2f8;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            font-weight: 600;
            color: var(--primary-color);
            border: 2px dashed #adcce0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { justify-content: center; text-align: center; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <header class="header">
            <div class="logo-container">
                <!-- Icono temporal, puedes reemplazarlo con <img src="logo.png" class="logo-img"> -->
                <i class="fas fa-hand-holding-heart"></i>
            </div>
            <div class="header-text">
                <h1>Nice Home <span>Care Services</span></h1>
            </div>
        </header>

        <section class="content-section">
            <h2 class="subhead">
                Cuidado Profesional en Casa
                <small>Servicios personalizados para su bienestar y tranquilidad.</small>
            </h2>
        </section>

        <div class="schedule-box">
            <i class="far fa-calendar-alt"></i>
            Horario de Atención: Lunes a Viernes - 8:00 AM a 6:00 PM
        </div>
    </div>

</body>
</html>
